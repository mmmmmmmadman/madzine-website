        <nav id="main-nav" class="nav">

          <a href="software.html" class="nav__link" data-i18n="nav.software">軟體</a>
          <a href="works.html" class="nav__link active" data-i18n="nav.works">作品</a>
          <a href="contact.html" class="nav__link" data-i18n="nav.contact">聯絡</a>

        <div class="lang-switcher">
          <button class="lang-btn" data-lang="zh-TW" onclick="I18N.setLang('zh-TW')">中</button>

          <button class="lang-btn" data-lang="ja" onclick="I18N.setLang('ja')">JP</button>

          <span class="menu-toggle__line"></span>

    <!-- 音樂作品 -->
    <section class="section--compact reveal">
      <div class="container">
        <div class="works-category">
          <div class="works-category__info">
            <h2 class="section__title" data-i18n="works.music.title">音樂作品</h2>
            <p class="section__subtitle" data-i18n="works.music.desc">原創音樂專輯與 EP</p>
            <div class="works-embed">
              <a href="works-music.html" class="works-link">
                <span class="works-link__icon">♫</span>
                <span class="works-link__text" data-i18n="common.more">查看更多</span>
                <span class="works-link__arrow">→</span>
              </a>
            </div>
          </div>
          <div class="works-category__slideshow">
            <img src="assets/images/music_1.jpg" alt="Dissolving Sounds" loading="lazy" class="active">
            <img src="assets/images/music_2.jpg" alt="Fragrance Liang" loading="lazy">
            <img src="assets/images/music_3.jpg" alt="Helsinki / Sapporo" loading="lazy">

                <span class="works-link__arrow">→</span>
              </a>
