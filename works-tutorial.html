<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MADZINE — Tutorials</title>
  <meta name="description" content="MADZINE 教學：VCV Rack 從零開始入門教學">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Works V1: Text List + Floating Preview ── */

    .works-v1 {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 0 var(--padding-page-x);
    }

    .works-v1__header {
      padding: var(--space-16) 0 var(--space-8);
    }

    .works-v1__title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--weight-extralight);
      line-height: var(--leading-tight);
      letter-spacing: var(--tracking-wider);
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .works-v1__subtitle {
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: var(--weight-regular);
      color: var(--text-secondary);
      margin-bottom: 0;
    }

    /* ── Row ── */

    .works-v1__list {
      margin-bottom: var(--space-24);
    }

    .works-v1__row {
      display: flex;
      align-items: baseline;
      gap: var(--space-4);
      padding: var(--space-4) 0;
      border-bottom: 1px solid var(--border-default);
      transition: color var(--duration-normal) var(--ease-default);
      color: var(--text-primary);
    }

    .works-v1__row:first-child {
      border-top: 1px solid var(--border-default);
    }

    .works-v1__row:hover {
      color: var(--color-primary);
    }

    .works-v1__row-title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: var(--weight-light);
      line-height: var(--leading-snug);
      letter-spacing: var(--tracking-wide);
      white-space: nowrap;
    }

    .works-v1__row-sep {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: var(--weight-extralight);
      color: var(--text-tertiary);
      flex-shrink: 0;
      transition: color var(--duration-normal) var(--ease-default);
    }

    .works-v1__row:hover .works-v1__row-sep {
      color: var(--color-primary);
      opacity: 0.5;
    }

    .works-v1__row-desc {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: var(--weight-regular);
      color: var(--text-secondary);
      line-height: var(--leading-snug);
      transition: color var(--duration-normal) var(--ease-default);
    }

    .works-v1__row:hover .works-v1__row-desc {
      color: var(--color-primary);
      opacity: 0.7;
    }

    /* ── Floating Preview ── */

    .works-v1__preview {
      position: fixed;
      top: 50%;
      right: 6%;
      transform: translateY(-50%);
      width: 420px;
      aspect-ratio: 16 / 9;
      pointer-events: none;
      z-index: 100;
    }

    .works-v1__preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      position: absolute;
      top: 0;
      left: 0;
      transition: opacity 1s var(--ease-default);
      border-radius: var(--radius-sm);
    }

    .works-v1__preview img.visible {
      opacity: 1;
    }

    /* ── Bottom Bar ── */
    .bottom-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-6);
      border-top: 1px solid var(--border-default);
      font-size: var(--text-sm);
    }

    .bottom-bar__copyright {
      color: var(--text-tertiary);
    }

    .bottom-bar__nav {
      display: flex;
      align-items: center;
      gap: var(--space-6);
    }

    .bottom-bar__nav a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--duration-normal) var(--ease-default);
    }

    .bottom-bar__nav a:hover {
      color: var(--color-primary);
    }

    .bottom-bar__controls {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    /* ── Responsive ── */

    @media (max-width: 900px) {
      .works-v1__preview {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .works-v1__header {
        padding: var(--space-10) 0 var(--space-6);
      }

      .works-v1__row {
        flex-wrap: wrap;
        gap: var(--space-1);
      }

      .works-v1__row-sep {
        display: none;
      }

      .works-v1__row-desc {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <main>
    <div class="works-v1">
      <div class="works-v1__header">
        <a href="works.html" class="section__back">
          <span data-i18n="common.back">返回</span>
        </a>
        <h1 class="works-v1__title" data-i18n="works.tutorial.title">教學</h1>
        <p class="works-v1__subtitle" data-i18n="works.tutorial.desc">VCV Rack 從零開始入門教學</p>
      </div>

      <div class="works-v1__list">
        <a href="https://youtube.com/playlist?list=PLd8Kv2bkmNnnCxov8N5vOpTFWQOZ2KC9v" class="works-v1__row" data-preview="vcvrack" target="_blank" rel="noopener">
          <span class="works-v1__row-title" data-i18n="works.tutorial.vcvrack.title">從零開始 VCV Rack</span>
          <span class="works-v1__row-sep">/</span>
          <span class="works-v1__row-desc" data-i18n="works.tutorial.vcvrack.desc">VCV Rack 從零開始入門教學，共 8 集</span>
        </a>
        <a href="https://www.dropbox.com/scl/fo/lnvmcqxognbm8ym2k77q5/AMw6-UWG9KD61UJCBW6uqJY?rlkey=exq9tfpupq97qr2k61nj11usp&dl=0" class="works-v1__row" target="_blank" rel="noopener">
          <span class="works-v1__row-title" data-i18n="tutorial.handout">模組合成器聲音設計</span>
          <span class="works-v1__row-sep">/</span>
          <span class="works-v1__row-desc" data-i18n="tutorial.handoutDesc">課程講義下載</span>
        </a>
      </div>
    </div>

    <!-- Floating Preview -->
    <div class="works-v1__preview" id="works-preview">
      <img data-key="vcvrack" src="https://img.youtube.com/vi/QmO30HBR96A/hqdefault.jpg" alt="">
    </div>
  </main>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <span class="bottom-bar__copyright" data-i18n="footer.copyright">&copy; 2025 MADZINE. 保留所有權利。</span>
    <nav class="bottom-bar__nav">
      <a href="index.html" data-i18n="nav.home">首頁</a>
      <a href="software.html" data-i18n="nav.software">軟體</a>
      <a href="works.html" data-i18n="nav.works">作品</a>
      <a href="contact.html" data-i18n="nav.contact">聯絡</a>
    </nav>
    <div class="bottom-bar__controls">
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="zh-TW" onclick="I18N.setLang('zh-TW')">中</button>
        <button class="lang-btn" data-lang="en" onclick="I18N.setLang('en')">EN</button>
        <button class="lang-btn" data-lang="ja" onclick="I18N.setLang('ja')">JP</button>
      </div>
      <button id="mode-toggle" class="mode-toggle" aria-label="切換深色模式">☽</button>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script>
    /* ── Floating preview on row hover ── */
    (function () {
      var rows = document.querySelectorAll('.works-v1__row');
      var imgs = document.querySelectorAll('#works-preview img');

      rows.forEach(function (row) {
        row.addEventListener('mouseenter', function () {
          var key = row.dataset.preview;
          imgs.forEach(function (img) {
            img.classList.toggle('visible', img.dataset.key === key);
          });
        });
        row.addEventListener('mouseleave', function () {
          imgs.forEach(function (img) {
            img.classList.remove('visible');
          });
        });
      });
    })();
  </script>
</body>
</html>
