<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Talk Translator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; min-height: 100vh; }

/* Setup Panel */
#setup { max-width: 700px; margin: 0 auto; padding: 32px; position: relative; }
#setup h1 { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 18px; font-weight: 500; margin-bottom: 8px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 14px; font-size: 18px;
  background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: #e0e0e0;
}
.field textarea { height: 150px; resize: vertical; }
.field input[type="password"] { font-family: monospace; }
.row { display: flex; gap: 16px; align-items: end; }
.row .field { flex: 1; }
.swap-btn { padding: 10px 16px; font-size: 20px; background: #333; border: 1px solid #555; border-radius: 6px; color: #e0e0e0; cursor: pointer; align-self: end; margin-bottom: 20px; }
.swap-btn:hover { background: #444; }
#startBtn {
  width: 100%; padding: 16px; font-size: 22px; font-weight: 600;
  background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer;
  margin-top: 12px;
}
#startBtn:hover { background: #1d4ed8; }
#startBtn:disabled { background: #555; cursor: not-allowed; }
.file-row { display: flex; gap: 12px; align-items: center; }
.file-row button { padding: 10px 20px; font-size: 18px; background: #333; border: 1px solid #555; border-radius: 6px; color: #e0e0e0; cursor: pointer; white-space: nowrap; }
.file-row span { font-size: 18px; color: #888; }
.hint { font-size: 14px; color: #666; margin-top: 4px; }
.preloaded-preview { max-height: 120px; overflow-y: auto; padding: 8px; background: #222; border-radius: 4px; font-size: 16px; color: #999; margin-top: 8px; white-space: pre-wrap; }
#errorMsg { color: #ef4444; font-size: 18px; margin-top: 12px; }

/* Live Panel */
#live { display: none; height: 100vh; flex-direction: column; }
.topbar { display: flex; align-items: center; padding: 12px 24px; gap: 16px; border-bottom: 1px solid #333; flex-shrink: 0; }
.lang-indicator { font-size: 18px; font-weight: 600; padding: 6px 16px; border-radius: 20px; user-select: none; }
.lang-a { background: #1e40af; color: white; }
.lang-b { background: #b91c1c; color: white; }
.lang-indicator.inactive { opacity: 0.3; }
.audio-level { flex: 0 0 120px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
.audio-level-fill { height: 100%; background: #22c55e; transition: width 0.1s linear; }
#stopBtn { margin-left: auto; font-size: 18px; font-weight: 500; color: #ef4444; background: none; border: 1px solid #ef4444; border-radius: 6px; padding: 6px 20px; cursor: pointer; }
#stopBtn:hover { background: #ef44441a; }

/* Transcript */
#transcript { flex: 1; overflow-y: auto; padding: 24px; }
.segment { margin-bottom: 20px; }
.segment .original { font-size: 18px; color: #888; margin-bottom: 4px; }
.segment .translated { font-size: 22px; color: #e0e0e0; font-weight: 500; }
.segment .translated.pending { color: #666; font-style: italic; }
#volatileText { font-size: 18px; color: #555; font-style: italic; padding: 0 24px 16px; }

/* Ended */
#endedPanel { display: none; text-align: center; padding: 40px; }
#endedPanel h2 { font-size: 22px; color: #888; margin-bottom: 16px; }
#endedPanel button { font-size: 18px; padding: 10px 24px; background: #333; border: 1px solid #555; border-radius: 6px; color: #e0e0e0; cursor: pointer; }

/* Model selector */
.model-field { margin-bottom: 20px; }
.model-field label { display: block; font-size: 18px; font-weight: 500; margin-bottom: 8px; }
.model-field select { width: 100%; padding: 10px 14px; font-size: 18px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: #e0e0e0; }

/* Top bar with lang switcher and help */
.setup-topbar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 8px; }
.ui-lang-switcher { display: flex; gap: 0; border: 1px solid #444; border-radius: 6px; overflow: hidden; }
.ui-lang-btn { padding: 6px 14px; font-size: 16px; background: #2a2a2a; color: #888; border: none; cursor: pointer; border-right: 1px solid #444; }
.ui-lang-btn:last-child { border-right: none; }
.ui-lang-btn.active { background: #2563eb; color: white; }
.ui-lang-btn:hover:not(.active) { background: #333; color: #e0e0e0; }
.help-btn { width: 36px; height: 36px; font-size: 20px; font-weight: 700; background: #2a2a2a; color: #888; border: 1px solid #444; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.help-btn:hover { background: #333; color: #e0e0e0; }

/* Help overlay */
#helpOverlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 1000; overflow-y: auto;
}
#helpContent {
  max-width: 720px; margin: 40px auto; padding: 32px; background: #1a1a1a;
  border: 1px solid #333; border-radius: 12px; position: relative;
}
#helpContent h2 { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
#helpContent h3 { font-size: 20px; font-weight: 600; margin-top: 24px; margin-bottom: 12px; color: #e0e0e0; }
#helpContent p, #helpContent li { font-size: 16px; line-height: 1.7; color: #ccc; }
#helpContent ul { margin-left: 20px; margin-bottom: 12px; }
#helpContent li { margin-bottom: 6px; }
#helpContent a { color: #60a5fa; text-decoration: none; }
#helpContent a:hover { text-decoration: underline; }
.help-close-btn {
  position: absolute; top: 16px; right: 16px; width: 36px; height: 36px;
  font-size: 22px; font-weight: 700; background: none; color: #888; border: 1px solid #444;
  border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.help-close-btn:hover { color: #e0e0e0; background: #333; }
</style>
</head>

<!-- SETUP -->
<div id="setup">

    <div class="hint" data-i18n-html="elevenLabsKeyHint">Get your key at <a href="https://elevenlabs.io/app/settings/api-keys" target="_blank" style="color:#60a5fa;">elevenlabs.io</a>. Free tier: 2.5 hours/month.</div>
  </div>

  <div class="field">
    <label data-i18n="apiKeyLabel">Anthropic API Key</label>
    <input type="password" id="apiKey" data-i18n-placeholder="apiKeyPlaceholder" placeholder="sk-ant-api03-...">
    <div class="hint" data-i18n-html="apiKeyHint">Get your key at <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#60a5fa;">console.anthropic.com</a>. Stored locally only.</div>
  </div>

  <div class="model-field">
    <label data-i18n="modelLabel">Model</label>
    <select id="modelSelect">
      <option value="claude-haiku-4-5-20251001" data-i18n="modelHaiku">Claude Haiku 4.5 (fastest, cheapest)</option>
      <option value="claude-sonnet-4-6" data-i18n="modelSonnet">Claude Sonnet 4.6 (balanced)</option>
      <option value="claude-opus-4-6" data-i18n="modelOpus">Claude Opus 4.6 (highest quality)</option>
    </select>
  </div>

  <div class="row">
    <div class="field">
      <label data-i18n="langALabel">Language A (primary speaker)</label>
      <select id="langA"></select>
    </div>
    <button class="swap-btn" onclick="swapLanguages()" data-i18n-title="swapTitle" title="Swap languages">&#8646;</button>
    <div class="field">
      <label data-i18n="langBLabel">Language B</label>
      <select id="langB"></select>
    </div>
  </div>

  <div class="field">
    <label data-i18n="preloadLabel">Preloaded Text (artist's statement / notes)</label>
    <div class="file-row">
      <button onclick="document.getElementById('fileInput').click()" data-i18n="loadFileBtn">Load Text File</button>
      <button onclick="clearPreloadedTexts()" style="background:#4a2020;" data-i18n="clearFilesBtn">Clear All</button>
      <input type="file" id="fileInput" accept=".txt,.md,.text" multiple style="display:none">
    </div>
    <div id="fileList" style="margin-top:8px;"></div>
    <div id="preloadedPreview" class="preloaded-preview" style="display:none"></div>
  </div>

  <div id="errorMsg"></div>
  <button id="startBtn" onclick="startSession()" data-i18n="startBtn">Start Session</button>
</div>

<!-- LIVE -->
<div id="live">
  <div class="topbar">
    <div class="lang-indicator lang-a" id="langABtn">
      <span id="langALabel">EN</span>
    </div>
    <div class="lang-indicator lang-b inactive" id="langBBtn">
      <span id="langBLabel">JA</span>
    </div>
    <div class="audio-level"><div class="audio-level-fill" id="levelFill"></div></div>
    <button id="stopBtn" onclick="stopSession()" data-i18n="stopBtn">Stop</button>
  </div>
  <div id="transcript"></div>
  <div id="volatileText"></div>
  <div id="endedPanel">
    <h2 data-i18n="sessionEnded">Session Ended</h2>
    <button onclick="returnToSetup()" data-i18n="backToSetup">Back to Setup</button>
  </div>
</div>

<!-- HELP OVERLAY -->
<div id="helpOverlay" onclick="if(event.target===this)toggleHelp()">
  <div id="helpContent">
    <button class="help-close-btn" onclick="toggleHelp()">&#10005;</button>
    <div id="helpBody"></div>
  </div>
</div>

let loadedFiles = []; // { name, content }

document.getElementById('fileInput').addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  let remaining = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      loadedFiles.push({ name: file.name, content: reader.result });
      remaining--;
      if (remaining === 0) {
        updatePreloadedDisplay();
        e.target.value = ''; // allow re-selecting same files
      }
    };
    reader.readAsText(file);
  });
});

function mapElevenLangToSide(langCode) {
  if (!langCode) return null;

  const langA = getLang('a');

// ---- AUDIO LEVEL ----
function startAudioLevel(stream) {
  if (!audioContext) audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);
  updateLevel();
}

function updateLevel() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) {
    const v = (data[i] - 128) / 128;
    sum += v * v;
  }
  const rms = Math.sqrt(sum / data.length);
  const level = Math.min(rms / 0.5, 1);
  document.getElementById('levelFill').style.width = (level * 100) + '%';
  animFrameId = requestAnimationFrame(updateLevel);
}

function stopAudioLevel() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  analyser = null;
}

function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (let i = 0; i < bytes.byteLength; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

// ---- ELEVENLABS TOKEN ----
async function getElevenLabsToken(apiKey) {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ apiKey }),
  });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`Token fetch failed (${res.status}): ${body}`);
  }
  const data = await res.json();
  return data.token;
}

// ---- ELEVENLABS WEBSOCKET ----
function connectElevenLabs(token) {
  const params = new URLSearchParams({
    model_id: 'scribe_v2_realtime',
    token: token,
    audio_format: 'pcm_16000',
    include_timestamps: 'true',
    include_language_detection: 'true',
    commit_strategy: 'vad',
    vad_silence_threshold_secs: '1.5',
    // language_code omitted = auto-detect
  });

  ws = new WebSocket(`wss://api.elevenlabs.io/v1/speech-to-text/realtime?${params}`);

  ws.onopen = () => {
    console.log('ElevenLabs WebSocket connected');
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    switch (msg.message_type) {
      case 'partial_transcript':
        updateVolatile(msg.text || '');
        break;
      case 'committed_transcript_with_timestamps':
        onFinalResult(msg.text || '', msg.language_code || null);
        break;
      case 'committed_transcript':
        onFinalResult(msg.text || '', null);
        break;
      case 'session_started':
        console.log('ElevenLabs session started:', msg);
        break;
      case 'error':
        console.error('ElevenLabs error:', msg);
        showLiveError(`${t('errWebSocket')}: ${msg.error || msg.message || JSON.stringify(msg)}`);
        break;
    }
  };

  ws.onerror = (err) => {
    console.error('ElevenLabs WebSocket error:', err);
  };

  ws.onclose = (event) => {
    console.log('ElevenLabs WebSocket closed:', event.code, event.reason);
    // If session still running, this might be a token expiry — handled by refresh timer
  };
}

function updateVolatile(text) {
  document.getElementById('volatileText').textContent = text;
}

function showLiveError(msg) {
  // Show error as a segment
  segments.push({ id: Date.now(), original: msg, translated: null, isError: true });
  renderSegments();
  scrollToBottom();
}

// ---- AUDIO WORKLET SETUP ----
async function setupAudioWorklet(stream) {
  if (!audioContext) audioContext = new AudioContext();

  // Resume context if suspended (autoplay policy)
  if (audioContext.state === 'suspended') {
    await audioContext.resume();
  }

  await audioContext.audioWorklet.addModule('audio-processor.js');
  const source = audioContext.createMediaStreamSource(stream);
  workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');

  workletNode.port.onmessage = (event) => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      const int16 = event.data; // Int16Array from worklet
      const base64 = arrayBufferToBase64(int16.buffer);
      ws.send(JSON.stringify({
        message_type: 'input_audio_chunk',
        audio_base_64: base64,
      }));
    }
  };

  source.connect(workletNode);
  workletNode.connect(audioContext.destination); // needed for processing to run; output is silent
}

// ---- TOKEN REFRESH ----
function scheduleTokenRefresh() {
  clearTokenRefresh();
  const elevenLabsKey = document.getElementById('elevenLabsKey').value.trim();
  tokenRefreshTimer = setTimeout(async () => {
    if (!isRunning) return;
    console.log('Refreshing ElevenLabs token...');
    try {
      const newToken = await getElevenLabsToken(elevenLabsKey);
      // Close old WebSocket
      if (ws) {
        ws.onclose = null; // prevent stale handler
        ws.close();
      }
      // Connect with new token
      connectElevenLabs(newToken);
      // Schedule next refresh
      scheduleTokenRefresh();
    } catch (err) {
      console.error('Token refresh failed:', err);
      showLiveError(`Token refresh failed: ${err.message}`);
    }
  }, TOKEN_REFRESH_MS);
}

function clearTokenRefresh() {
  if (tokenRefreshTimer) {
    clearTimeout(tokenRefreshTimer);
    tokenRefreshTimer = null;
  }
}

// ---- TRANSLATION (Claude) ----
async function translateWithClaude(text) {
  const apiKey = document.getElementById('apiKey').value;
  const model = document.getElementById('modelSelect').value;
  const langA = getLang('a');
  const langB = getLang('b');

  let systemPrompt = `You are a real-time translator for an artist talk event.
You will receive spoken text in either ${langA.forLLM} or ${langB.forLLM}.
Detect which language the input is in, then translate it to the OTHER language.
- If input is ${langA.forLLM}, translate to ${langB.forLLM}.
- If input is ${langB.forLLM}, translate to ${langA.forLLM}.
Output ONLY the translation. No explanations, no language labels, no notes.`;

  if (preloadedText) {
    const context = preloadedText.substring(0, 4000);
    systemPrompt += `

The artist's prepared statement (for context and terminology reference):
---
${context}
---
Use the above context to correctly translate proper nouns, artwork names, and art terminology.`;
  }

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: model,
      max_tokens: 1024,
      system: systemPrompt,
      messages: [{ role: 'user', content: text }],
    }),
  });

  if (!response.ok) {
    const errBody = await response.json().catch(() => null);
    const errMsg = errBody?.error?.message || `status ${response.status}`;
    throw new Error(errMsg);
  }

  const data = await response.json();
  return data.content[0].text.trim();
}

function onFinalResult(text, langCode) {
  if (!text || !text.trim()) return;
  text = text.trim();

  // Update detected language indicator
  const side = mapElevenLangToSide(langCode);
  if (side) {
    detectedLang = side;
    updateLangButtons();
  }

  // Clear volatile
  updateVolatile('');

  const segmentId = Date.now();
  segments.push({ id: segmentId, original: text, translated: null });
  renderSegments();
  scrollToBottom();

  translateWithClaude(text)
    .then(translated => {
      const seg = segments.find(s => s.id === segmentId);
      if (seg) {
        seg.translated = translated;
        renderSegments();
        scrollToBottom();
      }
    })
    .catch(err => {
      console.error('Translation error:', err);
      const seg = segments.find(s => s.id === segmentId);
      if (seg) {
        seg.translated = `(error: ${err.message.substring(0, 80)})`;
        renderSegments();
      }
    });
}

// ---- RENDERING ----
function renderSegments() {
  const container = document.getElementById('transcript');
  container.innerHTML = segments.map(s => {
    if (s.isError) {
      return `<div class="segment"><div class="original" style="color:#ef4444">${escapeHtml(s.original)}</div></div>`;
    }
    return `
    <div class="segment">
      <div class="original">${escapeHtml(s.original)}</div>
      <div class="translated ${s.translated ? '' : 'pending'}">${s.translated ? escapeHtml(s.translated) : t('translating')}</div>
    </div>
  `;
  }).join('');
}

function scrollToBottom() {
  const el = document.getElementById('transcript');
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ---- LANGUAGE INDICATOR ----
function updateLangButtons() {
  const aBtn = document.getElementById('langABtn');
  const bBtn = document.getElementById('langBBtn');
  aBtn.classList.toggle('inactive', detectedLang !== 'a');
  bBtn.classList.toggle('inactive', detectedLang !== 'b');
}

// ---- SESSION CONTROL ----
function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
}

async function startSession() {
  const elevenLabsKey = document.getElementById('elevenLabsKey').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!elevenLabsKey || !apiKey) { showError(t('errApiKeyRequired')); return; }
  if (!apiKey.startsWith('sk-')) { showError(t('errApiKeyRequired')); return; }

  const langACode = document.getElementById('langA').value;
  const langBCode = document.getElementById('langB').value;
  if (langACode === langBCode) { showError(t('errSameLang')); return; }

  showError('');

  // Save keys to localStorage
  localStorage.setItem('att_apiKey', apiKey);
  localStorage.setItem('att_elevenLabsKey', elevenLabsKey);
  localStorage.setItem('att_model', document.getElementById('modelSelect').value);

  // Disable start button during setup
  const startBtn = document.getElementById('startBtn');
  startBtn.disabled = true;

  try {
    // 1. Get ElevenLabs token
    const token = await getElevenLabsToken(elevenLabsKey);

    // 2. Get microphone
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    // 3. Update UI
    const langA = getLang('a');
    const langB = getLang('b');
    document.getElementById('langALabel').textContent = langA.short;
    document.getElementById('langBLabel').textContent = langB.short;

    document.getElementById('setup').style.display = 'none';
    document.getElementById('live').style.display = 'flex';
    document.getElementById('endedPanel').style.display = 'none';
    document.getElementById('transcript').style.display = 'block';

    isRunning = true;
    detectedLang = 'a';
    segments = [];
    renderSegments();
    updateLangButtons();

    // 4. Start audio level meter
    startAudioLevel(mediaStream);

    // 5. Connect ElevenLabs WebSocket
    connectElevenLabs(token);

    // 6. Start AudioWorklet for PCM capture
    await setupAudioWorklet(mediaStream);

    // 7. Schedule token refresh
    scheduleTokenRefresh();

  } catch (err) {
    console.error('Session start error:', err);
    showError(t('errTokenFetch') + ' (' + err.message + ')');
    startBtn.disabled = false;
    // Clean up if partially started
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    return;
  }

  startBtn.disabled = false;
}

function stopSession() {
  isRunning = false;

  // Stop token refresh
  clearTokenRefresh();

  // Close WebSocket
  if (ws) {
    ws.onclose = null;
    ws.close();
    ws = null;
  }

  // Stop AudioWorklet
  if (workletNode) {
    workletNode.disconnect();
    workletNode = null;
  }

  // Stop media stream
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }

  // Stop audio level
  stopAudioLevel();

  // Close audio context
  if (audioContext) {
    audioContext.close();
    audioContext = null;
  }

  updateVolatile('');
  document.getElementById('endedPanel').style.display = 'block';
}

function returnToSetup() {
  document.getElementById('live').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
}

// ---- INIT ----
populateSelects();
// Restore saved settings
const savedKey = localStorage.getItem('att_apiKey');
if (savedKey) document.getElementById('apiKey').value = savedKey;
const savedElevenKey = localStorage.getItem('att_elevenLabsKey');
if (savedElevenKey) document.getElementById('elevenLabsKey').value = savedElevenKey;
const savedModel = localStorage.getItem('att_model');
if (savedModel) document.getElementById('modelSelect').value = savedModel;
// Apply saved UI language
setLang(currentUILang);
</script>
